<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>INDEX vTEST</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto;background:#0e0f12;color:#e9eef3}
    .wrap{max-width:1000px;margin:0 auto;padding:20px}
    h1{font-size:clamp(28px,6vw,44px);margin:0 0 10px}
    .note{color:#9aa4b2;margin:0 0 20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .card{background:#fff;color:#111;border-radius:12px;border:1px solid #e7ebf0;padding:14px}
    .card h3{margin:0 0 6px}
    .desc{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin:0}
    .muted{color:#666;font-size:.9rem}
    input[type="search"]{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #333;background:#1b1d22;color:#e9eef3;margin:12px 0}
    a{color:#0b69c7}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>INDEX vTEST</h1>
    <p class="note">Эта тестовая главная страница показывает, что деплой реально обновился.
      Ниже карточки строятся из <code>/data/posts.json</code>.</p>

    <input id="q" type="search" placeholder="Szukaj…">
    <div id="info" class="muted"></div>
    <div id="grid" class="grid"></div>
  </div>

  <script>
  (async () => {
    const info = document.getElementById('info');
    const grid = document.getElementById('grid');
    const q = document.getElementById('q');

    // грузим posts.json без кеша
    const res = await fetch('/data/posts.json?v=' + Date.now(), { cache:'no-store' });
    const all = await res.json();
    const posts = all.filter(p => p.status === 'published' && !/\bvpn-na-routerze\.html$/.test(p.slug));
    info.textContent = `Znaleziono ${posts.length} postów`;

    const getDesc = (p) => {
      const d = (p.desc || '').toString().trim();
      return d ? (d.length > 160 ? d.slice(0,157) + '…' : d) : 'Czytaj więcej →';
    };

    const esc = s => (s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

    function render(list){
      grid.innerHTML = list
        .sort((a,b)=>(b.date||'').localeCompare(a.date||''))
        .map(p => `
          <article class="card">
            <h3><a href="/${p.slug}">${esc(p.title)}</a></h3>
            <p class="muted">${p.date || ''}</p>
            <p class="desc">${esc(getDesc(p))}</p>
          </article>`).join('');
      if (!list.length) grid.innerHTML = '<p>Nic nie znaleziono.</p>';
    }

    function apply(){
      const v = (q.value||'').toLowerCase();
      render(posts.filter(p => (p.title + ' ' + p.desc).toLowerCase().includes(v)));
    }

    q.addEventListener('input', apply);
    render(posts);
  })();
  </script>
</body>
</html>
