<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog o VPN</title>
  <meta name="description" content="Artykuły o VPN, bezpieczeństwie online i prywatności.">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <div class="wrap">
    <h1>Blog</h1>
    <input id="q" type="search" placeholder="Szukaj po tytule/opisie…">
    <div id="posts" class="grid"></div>
  </div>

  <script>
  (async () => {
    // --- utils ---
    const esc = s => (s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const PLACEHOLDER = /Treść artykułu do uzupełnienia|Opis do uzupełnienia|Czytaj więcej/i;
    const trimDesc = t => {
      const d = (t||'').toString().trim();
      return d ? (d.length > 160 ? d.slice(0,157) + '…' : d) : 'Czytaj więcej →';
    };
    const cacheKey = slug => 'desc:' + slug;

    function cleanHtml(html){
      return html
        .replace(/<script[\s\S]*?<\/script>/gi,'')
        .replace(/<style[\s\S]*?<\/style>/gi,'')
        .replace(/<!--[\s\S]*?-->/g,'');
    }
    function textOnly(s){ return (s||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim(); }

    // Извлечь анонс из HTML: meta → og:desc → первый «нормальный» <p> → fallback
    function extractDescFromHtml(html){
      const h = cleanHtml(html);

      // 1) meta description
      const m1 = h.match(/<meta[^>]*name=["']description["'][^>]*content=["']([^"']+)["']/i);
      if (m1 && textOnly(m1[1]).length >= 60) return trimDesc(m1[1]);

      // 2) og:description
      const m2 = h.match(/<meta[^>]*property=["']og:description["'][^>]*content=["']([^"']+)["']/i);
      if (m2 && textOnly(m2[1]).length >= 60) return trimDesc(m2[1]);

      // 3) первый содержательный <p> в <article>
      const article = (h.match(/<article[\s\S]*?<\/article>/i)||[])[0] || h;
      const ps = [...article.matchAll(/<p[^>]*>([\s\S]*?)<\/p>/gi)]
        .map(m => textOnly(m[1]))
        .map(t => t.replace(/^Skrót:\s*/i,''));
      const goodP = ps.find(t => t && !PLACEHOLDER.test(t) && t.length >= 60);
      if (goodP) return trimDesc(goodP);

      // 4) общий фоллбэк: первые 200 символов текста статьи
      const plain = textOnly(article);
      if (plain) return trimDesc(plain.slice(0, 200));

      return '';
    }

    async function getAutoDesc(slug){
      try{
        // кэш на клиенте
        const ck = cacheKey(slug);
        const cached = localStorage.getItem(ck);
        if (cached) return cached;

        const url = '/' + slug.replace(/^\/+/,'') + '?v=' + Date.now();
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) return '';

        const html = await res.text();
        const desc = extractDescFromHtml(html);
        if (desc) localStorage.setItem(ck, desc);
        return desc;
      }catch(e){ return ''; }
    }

    // --- загрузка манифеста ---
    const res = await fetch('/data/posts.json?v=' + Date.now(), { cache: 'no-store' });
    const all = await res.json();
    const posts = all.filter(p => p.status === 'published' && !/\bvpn-na-routerze\.html$/.test(p.slug));

    const container = document.getElementById('posts');
    const q = document.getElementById('q');

    function card(p, i){
      const id = 'desc-' + i;
      const desc = trimDesc(p.desc);
      return `
        <article class="card">
          <a href="/${p.slug}" aria-label="${esc(p.title)}">
            <img class="card-thumb" src="${p.thumb}" alt="${esc(p.title)}" width="640" height="360">
          </a>
          <div class="card-body">
            <h3 class="card-title"><a href="/${p.slug}">${esc(p.title)}</a></h3>
            <div class="card-meta">
              ${p.date ? `<time datetime="${p.date}">${p.date}</time>` : ''}
              ${(p.tags || []).slice(0,3).map(t => `<span class="badge">${esc(String(t))}</span>`).join('')}
            </div>
            <p class="card-desc" id="${id}">${esc(desc)}</p>
          </div>
          <div class="card-footer"><a class="btn" href="/${p.slug}">Czytaj</a></div>
        </article>`;
    }

    async function hydrate(list){
      await Promise.all(list.map(async (p, i) => {
        const cur = (p.desc||'').toString();
        if (!cur.trim() || PLACEHOLDER.test(cur) || cur.length < 60) {
          const el = document.getElementById('desc-' + i);
          const auto = await getAutoDesc(p.slug);
          if (auto && el) el.textContent = auto;
        }
      }));
    }

    function render(list){
      const sorted = [...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      container.innerHTML = sorted.map((p,i)=>card(p,i)).join('');
      hydrate(sorted);
      if (!sorted.length) container.innerHTML = '<p>Nic nie znaleziono.</p>';
    }

    function apply(){
      const v = (q.value||'').toLowerCase();
      render(posts.filter(p => (p.title + ' ' + (p.desc||'')).toLowerCase().includes(v)));
    }

    q.addEventListener('input', apply);
    render(posts);
  })();
  </script>
</body>
</html>
