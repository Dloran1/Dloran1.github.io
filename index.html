<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog o VPN</title>
  <meta name="description" content="Artykuły o VPN, bezpieczeństwie online i prywatności.">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/assets/css/blog.css">
  <style>
    .wrap{max-width:960px;margin:0 auto;padding:1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.2rem;margin-top:1rem}
    .card{background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08);overflow:hidden;display:flex;flex-direction:column}
    .card-thumb{width:100%;height:auto;display:block}
    .card-body{padding:1rem}
    .card-title{margin:.25rem 0 .5rem;font-size:1.1rem}
    .card-meta{font-size:.85rem;color:#666;margin-bottom:.6rem}
    .badge{display:inline-block;background:#eee;border-radius:4px;font-size:.75rem;padding:.15rem .45rem;margin-right:.25rem}
    .card-desc{color:#333;font-size:.95rem}
    .card-footer{padding:.8rem 1rem;background:#fafafa;text-align:right}
    .btn{background:#0056b3;color:#fff;padding:.45rem .8rem;border-radius:4px;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Blog</h1>
    <input id="q" type="search" placeholder="Szukaj po tytule/opisie…" style="width:100%;padding:.6rem .8rem;border:1px solid #ddd;border-radius:8px;">
    <div id="posts" class="grid" aria-live="polite"></div>
  </div>

  <script>
  (async () => {
    const esc = s => (s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const baseName = slug => (slug||'').split('/').pop().replace(/\.html$/,'');
    const ts = () => Date.now();

    // 1) грузим свежий posts.json
    let all = [];
    try {
      const res = await fetch('/data/posts.json?ts=' + ts());
      all = await res.json();
    } catch (e) {
      console.error('Nie mogę pobrać posts.json', e);
      all = [];
    }

    const posts = (all||[]).filter(p => p && p.slug && p.status !== 'draft');

    const container = document.getElementById('posts');
    const q = document.getElementById('q');

    function cardHTML(p){
      return `
        <article class="card">
          <a href="/${p.slug}" aria-label="${esc(p.title)}">
            <img class="card-thumb" src="${p.thumb}" alt="${esc(p.title)}">
          </a>
          <div class="card-body">
            <h3 class="card-title"><a href="/${p.slug}">${esc(p.title)}</a></h3>
            <div class="card-meta">
              ${p.date ? `<time datetime="${esc(p.date)}">${esc(p.date)}</time>` : ''}
              ${(p.tags||[]).slice(0,3).map(t => `<span class="badge">${esc(t)}</span>`).join('')}
            </div>
            <p class="card-desc" data-slug="${esc(p.slug)}">${esc(p.desc||'')}</p>
          </div>
          <div class="card-footer">
            <a class="btn" href="/${p.slug}">Czytaj</a>
          </div>
        </article>`;
    }

    function render(list){
      const sorted = [...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      container.innerHTML = sorted.map(p => cardHTML(p)).join('') || '<p>Nic nie znaleziono.</p>';
      hydrate(sorted);
    }

    // 2) ВСЕГДА подменяем описание, если есть descriptions/<slug>.txt
    async function fetchDescFile(name){
      // пробуем абсолютный путь (user pages)
      try {
        const r1 = await fetch('/descriptions/' + name + '.txt?ts=' + ts(), {cache:'no-store'});
        if (r1.ok) return (await r1.text()).trim();
      } catch {}
      // пробуем относительный путь (project pages)
      try {
        const r2 = await fetch('descriptions/' + name + '.txt?ts=' + ts(), {cache:'no-store'});
        if (r2.ok) return (await r2.text()).trim();
      } catch {}
      return '';
    }

    async function hydrate(list){
      await Promise.all(list.map(async (p) => {
        const el = container.querySelector(`.card-desc[data-slug="${CSS.escape(p.slug)}"]`);
        if (!el) return;
        const name = baseName(p.slug);
        const txt = await fetchDescFile(name);
        if (txt) el.textContent = txt.length > 160 ? txt.slice(0,157) + '…' : txt;
      }));
    }

    function apply(){
      const v = (q.value||'').toLowerCase();
      const filtered = posts.filter(p => (p.title + ' ' + (p.desc||'')).toLowerCase().includes(v));
      render(filtered);
    }

    q.addEventListener('input', apply);
    render(posts);
  })();
  </script>
</body>
</html>
