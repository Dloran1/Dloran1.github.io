<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog o VPN</title>
  <meta name="description" content="Artykuły o VPN, bezpieczeństwie online i prywatności.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <div class="wrap">
    <h1>Blog</h1>
    <input id="q" type="search" placeholder="Szukaj po tytule/opisie…">
    <div id="grid" class="grid"></div>
  </div>

  <script>
  (async () => {
    // грузим posts.json без кеша
    const res = await fetch('/data/posts.json?v=' + Date.now(), { cache: 'no-store' });
    const all = await res.json();

    // фильтруем: только опубликованные и без vpn-na-routerze
    const posts = all.filter(p => p.status === 'published' && !/\bvpn-na-routerze\.html$/.test(p.slug));

    const grid = document.getElementById('grid');
    const q = document.getElementById('q');

    // берём анонс с обрезкой
    const getDesc = (p) => {
      const d = (p.desc || '').toString().trim();
      if (!d) return 'Czytaj więcej →';
      return d.length > 160 ? d.slice(0, 157) + '…' : d;
    };

    const escapeHtml = s => s.replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));

    function cardHTML(p) {
      const desc = escapeHtml(getDesc(p));
      return `
        <article class="card">
          <a href="/${p.slug}" aria-label="${escapeHtml(p.title)}">
            <img class="card-thumb" src="${p.thumb}" width="640" height="360" alt="${escapeHtml(p.title)}">
          </a>
          <div class="card-body">
            <h3 class="card-title"><a href="/${p.slug}">${escapeHtml(p.title)}</a></h3>
            <div class="card-meta">
              ${p.date ? `<time datetime="${p.date}">${p.date}</time>` : ''}
              ${(p.tags || []).slice(0,3).map(t => `<span class="badge">${escapeHtml(String(t))}</span>`).join('')}
            </div>
            <p class="card-desc">${desc}</p>
          </div>
          <div class="card-footer"><a class="btn" href="/${p.slug}">Czytaj</a></div>
        </article>`;
    }

    function render(list){
      grid.innerHTML = list
        .sort((a,b) => (b.date||'').localeCompare(a.date||''))
        .map(cardHTML)
        .join('');
      if (!list.length) grid.innerHTML = '<p>Nic nie znaleziono.</p>';
    }

    function apply(){
      const qv = (q.value || '').toLowerCase();
      render(posts.filter(p => (p.title + ' ' + p.desc).toLowerCase().includes(qv)));
    }

    q.addEventListener('input', apply);
    render(posts);
  })();
  </script>
</body>
</html>
