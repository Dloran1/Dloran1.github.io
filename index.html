<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog o VPN</title>
  <meta name="description" content="Artykuły o VPN: porady, testy, konfiguracje i bezpieczeństwo online.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <div class="wrap">
    <h1>Blog</h1>
    <div id="posts" class="posts"></div>
  </div>

  <script>
  // Загружаем список статей
  async function loadPosts() {
    const resp = await fetch("/data/posts.json");
    const posts = await resp.json();
    const container = document.getElementById("posts");

    for (const post of posts) {
      // создаем карточку
      const card = document.createElement("div");
      card.className = "post-card";
      card.dataset.slug = post.slug;

      card.innerHTML = `
        <a href="${post.slug}">
          <img src="${post.thumb}" alt="${post.title}">
          <h2>${post.title}</h2>
        </a>
        <p class="date">${post.date}</p>
        <p class="desc">Ładowanie opisu...</p>
        <a class="readmore" href="${post.slug}">Czytaj</a>
      `;

      container.appendChild(card);

      // тянем описание из HTML статьи
      const descBox = card.querySelector(".desc");
      const desc = await getDescription(post.slug);
      descBox.textContent = desc;
    }
  }

  // Функция для вытягивания description из HTML
  async function getDescription(slug) {
    try {
      const resp = await fetch("/" + slug);
      if (!resp.ok) return "Treść artykułu do uzupełnienia.";

      const html = await resp.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      // берем meta description или первый абзац
      let desc = doc.querySelector('meta[name="description"]')?.content;
      if (!desc) {
        desc = doc.querySelector("article p")?.innerText || "";
      }

      return desc.trim();
    } catch (e) {
      console.error("Błąd pobierania opisu:", e);
      return "Treść artykułu do uzupełnienia.";
    }
  }

  loadPosts();
  </script>
</body>
</html>
