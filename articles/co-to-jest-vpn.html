<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Co To Jest VPN</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <div class="wrap">
    <article class="article" id="article-content">
      <h1>Ładowanie...</h1>
      <p>Proszę czekać, trwa wczytywanie artykułu.</p>
    </article>
  </div>

  <script>
    async function loadArticle() {
      try {
        // Определяем имя файла, например co-to-jest-vpn.html
        const slug = window.location.pathname.split('/').pop();
        const url = '/blog/' + slug;

        // Загружаем HTML из папки /blog/
        const res = await fetch(url);
        if (!res.ok) throw new Error("Błąd pobierania: " + url);

        const html = await res.text();

        // Вставляем внутрь <article>
        document.getElementById("article-content").innerHTML = html;
      } catch (err) {
        document.getElementById("article-content").innerHTML =
          "<p style='color:red'>Nie udało się wczytać artykułu.</p><pre>" + err + "</pre>";
      }
    }

    loadArticle();
  </script>
</body>
</html>
