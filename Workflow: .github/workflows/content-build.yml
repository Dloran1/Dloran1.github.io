name: Build content (posts.json + descriptions + RSS + sitemap)

on:
  push:
    paths:
      - 'articles/**'
      - 'assets/img/**'
      - 'descriptions/**'
      - 'scripts/build-content.js'
      - '.github/workflows/content-build.yml'
      - 'index.html'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator
        run: node scripts/build-content.js

      - name: Commit & push changes (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "actions-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/posts.json rss.xml sitemap.xml descriptions || true
            git commit -m "auto: rebuild posts.json/rss/sitemap/descriptions"
            git push
          else
            echo "No changes to commit."
          fi