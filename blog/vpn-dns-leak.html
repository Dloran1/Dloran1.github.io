<h1>Test wycieków DNS</h1>
<h2>Jak testować?</h2>
<p>Wejdź na dnsleaktest.com → uruchom rozszerzony test. Nazwy serwerów DNS powinny należeć do dostawcy VPN.</p>
<h2>Jak naprawić wycieki</h2>
<p>Włącz DNS dostawcy VPN, przełącz protokół, rozważ wyłączenie IPv6.</p>
