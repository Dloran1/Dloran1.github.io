/* Рендер карточек. Пытаемся загрузить миниатюру по слагу; если ошибки — ставим placeholder */
function card(post){
  const href = `/blog/${post.slug}.html`;
  const thumb = `/assets/img/thumbs/${post.slug}.webp`;
  const fallback = `/assets/img/thumbs/placeholder.webp`;
  return `
  <article class="card">
    <a class="thumb" href="${href}">
      <img src="${thumb}" alt="${post.title}"
           loading="lazy"
           onerror="this.onerror=null;this.src='${fallback}'">
    </a>
    <h3><a href="${href}">${post.title}</a></h3>
    <p class="muted">Poradnik i praktyczne wskazówki dotyczące VPN.</p>
    <div class="btns">
      <a class="btn btn-primary" href="${href}">Czytaj dalej</a>
    </div>
  </article>`;
}

const list = document.getElementById('list');
function render(arr){ list.innerHTML = arr.map(card).join(''); }
render(POSTS);

/* Поиск */
document.getElementById('q').addEventListener('input', e=>{
  const q = e.target.value.trim().toLowerCase();
  if(!q){ render(POSTS); return; }
  render(POSTS.filter(p=>p.title.toLowerCase().includes(q)));
});
</script>
