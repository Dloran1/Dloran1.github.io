<script>
/* СЛУГИ ВСЕХ СТАТЕЙ — добавил всё, что видно на твоих скринах */
const POSTS = [
  "co-to-jest-vpn",
  "darmowe-vs-platne-vpn",
  "darmowy-vpn-polska",
  "dlaczego-vpn-2025",
  "jaki-serwer-vpn-wybrac",
  "jaki-serwer-vpn",
  "mity-o-vpn",
  "no-logs",
  "nordvpn-vs-surfshark-pl",
  "player-tvp-vpn",
  "test-vpn",
  "vpn-android-konfiguracja",
  "vpn-iphone-konfiguracja",
  "vpn-windows-konfiguracja",
  "vpn-kill-switch",
  "vpn-geoblokady",
  "vpn-netflix-polska",
  "vpn-dns-leak",
  "vpn-double-vpn",
  "vpn-publiczne-wifi",
  "vpn-split-tunneling",
  "vpn-port-forwarding",
  "vpn-praca-zdalna",
  "vpn-szybkosc-test",
  "vpn-torrent",
  "vpn-torrent-polska",
  "wifi-bezpieczenstwo",
  "wireguard-vs-openvpn",
  "zalety-vpn",
  "vpn-kontrola-routera",
  "vpn-optymalne-ustawienia",
  "vpn-p2p-bezpiecznie",
  "vpn-dla-apple-tv",
  "vpn-dla-firm-msp",
  "vpn-dla-graczy",
  "vpn-dla-konsol-ps5-xbox",
  "vpn-dla-smart-tv",
  "vpn-bankowosc-online",
  "vpn-a-prawo-w-polsce"
];

/* Заголовок из слуга: заменяем дефисы и капитализируем */
function titleFromSlug(slug){
  const map = {
    'vpn':'VPN','ios':'iOS','iphone':'iPhone','android':'Android',
    'tvp':'TVP','ps5':'PS5','xbox':'Xbox','dns':'DNS','vod':'VOD',
    'wireguard':'WireGuard','openvpn':'OpenVPN','smart':'Smart'
  };
  return slug.split('-').map(w=>{
    return map[w] || w.charAt(0).toUpperCase()+w.slice(1);
  }).join(' ');
}

/* Небольшие подсказки-описания по ключевым слугам (необязательные) */
const hints = {
  "co-to-jest-vpn":"Podstawy i zasada działania VPN.",
  "darmowe-vs-platne-vpn":"Różnice, bezpieczeństwo i limity.",
  "vpn-android-konfiguracja":"Instrukcja i bezpieczne ustawienia.",
  "vpn-iphone-konfiguracja":"Szybka konfiguracja na iOS.",
  "vpn-windows-konfiguracja":"Ustawienia na Windows.",
  "vpn-kill-switch":"Blokada ruchu poza tunelem.",
  "vpn-geoblokady":"Jak obchodzić blokady regionalne.",
  "vpn-dns-leak":"Test i naprawa wycieków DNS.",
  "vpn-publiczne-wifi":"Zasady bezpieczeństwa w sieciach publicznych.",
  "vpn-split-tunneling":"Kiedy wykluczać aplikacje z VPN.",
  "vpn-torrent":"P2P — jak korzystać bezpiecznie.",
  "wireguard-vs-openvpn":"Porównanie protokołów."
};

/* Рендер */
const list = document.getElementById('list');
function render(filter=""){
  list.innerHTML = "";
  const f = filter.trim().toLowerCase();
  const items = POSTS
    .filter(s => !f || titleFromSlug(s).toLowerCase().includes(f))
    .map(s => {
      const a = document.createElement('article');
      a.className = 'post';
      a.innerHTML = `
        <h2><a href="/blog/${s}.html">${titleFromSlug(s)}</a></h2>
        <p>${hints[s] || "Poradnik i wskazówki praktyczne."}</p>
        <p><a class="badge" href="/blog/${s}.html" aria-label="Czytaj dalej: ${titleFromSlug(s)}">Czytaj dalej</a></p>
      `;
      return a;
    });
  if(items.length===0){
    const none = document.createElement('p'); none.textContent = "Brak wyników.";
    list.appendChild(none);
  }else{
    items.forEach(n=>list.appendChild(n));
  }
}
render();

/* Поиск */
document.getElementById('q').addEventListener('input', e=>render(e.target.value));
</script>
