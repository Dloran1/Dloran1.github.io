name: Build Blog from /articles

on:
  push:
    branches: [ main ]
    paths:
      - 'articles/**'
      - 'assets/**'
      - 'scripts/**'
      - '.github/workflows/site.yml'
      - 'config/slugs.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: mkdir -p articles data

      # 1) scaffold новых html (опционально)
      - run: node scripts/scaffold-articles.mjs || true

      # 2) собрать posts.json (берёт meta/первый <p> и т.п.)
      - run: node scripts/build-manifest.mjs

      # 3) дополнить desc из HTML там, где заглушки/пусто
      - name: Backfill desc from HTML
        run: node scripts/backfill-desc.mjs

      # 4) валидатор ассетов (не падаем, только лог)
      - run: node scripts/validate.mjs || true

      # 5) sitemap + rss
      - run: node scripts/gen-sitemap.mjs
      - run: node scripts/gen-rss.mjs

      # 6) коммитим артефакты
      - name: Commit generated files
        run: |
          git config user.name "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          git add data/posts.json sitemap.xml rss.xml || true
          git commit -m "Auto build blog (desc backfilled) [skip ci]" || echo "No changes"
          git push

      # 7) ping Google (best-effort)
      - name: Ping Google
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://Dloran1.github.io/sitemap.xml" || true