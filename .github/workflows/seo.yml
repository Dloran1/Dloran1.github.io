name: SEO test (sitemap only)

on:
  push:
    branches: [ "main" ]   # если у тебя master — замени на "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate minimal sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url>' >> sitemap.xml
          echo '    <loc>https://dloran1.github.io/</loc>' >> sitemap.xml
          echo '    <lastmod>'$(date -u +%Y-%m-%d)'</lastmod>' >> sitemap.xml
          echo '  </url>' >> sitemap.xml
          echo '</urlset>' >> sitemap.xml

      - name: Commit & push sitemap.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "ci: add minimal sitemap" || echo "nothing to commit"
          git push